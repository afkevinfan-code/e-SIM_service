services:
  - type: web
    name: e-sim-service
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python support_server.py --host 0.0.0.0
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: SUPPORT_USERNAME
        sync: false
      - key: SUPPORT_PASSWORD
        sync: false
